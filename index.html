<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reina Lejana - Romántico Reggaetón</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
            touch-action: manipulation;
        }
        #intro {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 20;
            transition: opacity 0.4s ease-out;
        }
        #intro.hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 2.3em;
            color: #ff69b4;
            animation: pulse 2s infinite;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        #play-btn {
            font-size: 9em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #play-btn:active {
            transform: scale(1.25);
        }
        #status {
            font-size: 1.4em;
            color: #ff69b4;
            margin-top: 40px;
            padding: 15px;
            background: rgba(255,105,180,0.15);
            border-radius: 12px;
            display: none;
            max-width: 80%;
            text-align: center;
        }
        #main-content {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #lyrics-container {
            font-size: 1.7em;
            text-align: center;
            white-space: pre-wrap;
            max-width: 92%;
            line-height: 1.5;
            padding: 20px;
        }
        .highlight {
            color: #ff69b4;
            font-weight: bold;
            text-shadow: 0 0 15px #ff69b4;
        }
        canvas {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="intro">
        <h1>Toca el auricular para reproducir</h1>
        <div id="play-btn">🎧</div>
        <div id="status"></div>
    </div>

    <div id="main-content">
        <div id="lyrics-container"></div>
    </div>

    <canvas id="particles"></canvas>
    <audio id="audio" src="musica.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const intro = document.getElementById('intro');
        const mainContent = document.getElementById('main-content');
        const status = document.getElementById('status');
        const lyricsContainer = document.getElementById('lyrics-container');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let audioCtx = null;
        let particles = [];
        let allowTouchParticles = false;
        let currentLine = 0;

        // Letras (completa con tiempos reales de tu canción para sync perfecto)
        const lyrics = [
            { time: 0, text: "Reina... lejana... pero tan cerca en mi mente...\n" },
            { time: 5, text: "Ansias que no paran... vení...\n" },
            { time: 10, text: "De lejos te veo, en la pantalla tu luz,\n" },
            { time: 15, text: "Tu mirada me quema, me deja sin cruz.\n" },
            { time: 20, text: "La distancia es un fuego que no se apaga,\n" },
            { time: 25, text: "Cada mensaje tuyo me salva la alma.\n" },
            { time: 30, text: "De cerca eras todo, besos que encienden,\n" },
            { time: 35, text: "Ahora solo sueños, pero el amor no se vende.\n" },
            { time: 40, text: "Ansiedad en el pecho, loco por tocarte,\n" },
            { time: 45, text: "Pero suave te digo: no voy a soltarte.\n" },
            { time: 50, text: "¡Mi reina lejana! Ven a mis brazos ya,\n" },
            { time: 55, text: "De lejos te amo, de cerca te extrañá.\n" },
            { time: 60, text: "No hay diferencia, sos mi obsesión,\n" },
            { time: 65, text: "Suave en la piel, loca pasión.\n" },
            { time: 70, text: "¡Reina, reina! Ansias que me matan,\n" },
            { time: 75, text: "Sexy en la noche, romántica en calma.\n" },
            { time: 80, text: "Cerca o lejos, sos mi reina eterna,\n" },
            { time: 85, text: "Con vos todo brilla, mi vida se gobierna.\n" },
            { time: 90, text: "Imaginando tu cuerpo bailando en mi mente,\n" },
            { time: 95, text: "Curvas que llaman, sudor que se siente.\n" },
            // Agrega el resto si la canción es más larga, ajustando tiempos
            { time: 180, text: "Mi reina lejana... de lejos te amo...\n" }
        ];

        class Particle {
            constructor(x, y, isStar = false) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 28 + 16;
                this.speedY = Math.random() * 3 + 1.5;
                this.opacity = 1;
                this.isStar = isStar;
            }
            update() {
                this.y += this.speedY;
                if (this.y > canvas.height + this.size) this.y = -this.size; // Caen desde arriba y reinician
                if (this.isStar) this.opacity -= 0.018;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < 30; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * -canvas.height)); // Empiezan arriba
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return !p.isStar || p.opacity > 0;
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function addStarBurst(x, y) {
            if (!allowTouchParticles) return;
            for (let i = 0; i < 14; i++) {
                let p = new Particle(x, y, true);
                p.speedY = Math.random() * 5 - 2.5;
                particles.push(p);
            }
        }

        document.addEventListener('touchstart', e => {
            if (allowTouchParticles) {
                e.preventDefault();
                [...e.touches].forEach(t => addStarBurst(t.clientX, t.clientY));
            }
        }, { passive: false });

        document.addEventListener('click', e => {
            if (allowTouchParticles) addStarBurst(e.clientX, e.clientY);
        });

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx.resume().catch(() => {});
        }

        function showLyrics() {
            const t = audio.currentTime;
            while (currentLine < lyrics.length && t >= lyrics[currentLine].time) {
                const line = lyrics[currentLine].text;
                let i = 0;
                const int = setInterval(() => {
                    if (i < line.length) {
                        const s = document.createElement('span');
                        s.textContent = line[i];
                        if (Math.random() > 0.5) s.classList.add('highlight');
                        lyricsContainer.appendChild(s);
                        i++;
                    } else {
                        clearInterval(int);
                        lyricsContainer.innerHTML += '<br>';
                        currentLine++;
                    }
                }, 55); // Ajusta para ritmo (más bajo = más rápido)
            }
            requestAnimationFrame(showLyrics);
        }

        function startEverything() {
            // Ocultar intro inmediatamente al tocar
            intro.classList.add('hidden');
            mainContent.style.display = 'flex';

            initAudioContext();
            audio.play().then(() => {
                status.style.display = 'none';
                allowTouchParticles = true;
                showLyrics();
            }).catch(err => {
                console.log(err);
                intro.classList.remove('hidden');
                mainContent.style.display = 'none';
                status.textContent = "Toca de nuevo – Android necesita confirmación";
                status.style.display = 'block';
            });
        }

        // Triggers
        document.getElementById('play-btn').addEventListener('touchstart', startEverything);
        intro.addEventListener('touchstart', startEverything);
        intro.addEventListener('click', startEverything);

        // Backup si suena sin ocultar
        audio.addEventListener('playing', () => {
            intro.classList.add('hidden');
            mainContent.style.display = 'flex';
            allowTouchParticles = true;
            showLyrics();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
