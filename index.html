<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reina Lejana</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
            touch-action: manipulation;
        }
        #intro {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 20;
            transition: opacity 0.3s;
        }
        #intro.hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 2.5em;
            color: #ff69b4;
            animation: pulse 2s infinite;
            text-align: center;
            padding: 0 20px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        #play-btn {
            font-size: 10em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #play-btn:active {
            transform: scale(1.3);
        }
        #status {
            font-size: 1.5em;
            color: #ff69b4;
            margin-top: 40px;
            display: none;
            text-align: center;
            padding: 10px;
        }
        #lyrics {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.8em;
            text-align: center;
            line-height: 1.6;
            padding: 20px;
            white-space: pre-wrap;
            z-index: 10;
        }
        .highlight {
            color: #ff69b4;
            font-weight: bold;
            text-shadow: 0 0 10px #ff69b4;
        }
        canvas {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="intro">
        <h1>Toca el ❤️ para reproducir</h1>
        <div id="play-btn">🎧</div>
        <div id="status"></div>
    </div>

    <div id="lyrics"></div>

    <canvas id="particles"></canvas>
    <audio id="audio" src="musica.mp3" preload="metadata"></audio>

    <script>
        const audio = document.getElementById('audio');
        const intro = document.getElementById('intro');
        const lyricsDiv = document.getElementById('lyrics');
        const status = document.getElementById('status');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let allowTouch = false;
        let currentIndex = 0;

        // Letras con tiempos (ajusta según tu canción)
        const lyricsData = [
            { time: 0, text: "Reina... lejana... pero tan cerca en mi mente..." },
            { time: 5, text: "Ansias que no paran... vení..." },
            { time: 10, text: "De lejos te veo, en la pantalla tu luz," },
            { time: 15, text: "Tu mirada me quema, me deja sin cruz." },
            { time: 20, text: "La distancia es un fuego que no se apaga," },
            { time: 25, text: "Cada mensaje tuyo me salva la alma." },
            { time: 30, text: "De cerca eras todo, besos que encienden," },
            { time: 35, text: "Ahora solo sueños, pero el amor no se vende." },
            { time: 40, text: "Ansiedad en el pecho, loco por tocarte," },
            { time: 45, text: "Pero suave te digo: no voy a soltarte." },
            { time: 50, text: "¡Mi reina lejana! Ven a mis brazos ya," },
            { time: 55, text: "De lejos te amo, de cerca te extrañá." },
            { time: 60, text: "No hay diferencia, sos mi obsesión," },
            { time: 65, text: "Suave en la piel, loca pasión." },
            { time: 70, text: "¡Reina, reina! Ansias que me matan," },
            { time: 75, text: "Sexy en la noche, romántica en calma." },
            { time: 80, text: "Cerca o lejos, sos mi reina eterna," },
            { time: 85, text: "Con vos todo brilla, mi vida se gobierna." },
            // Agrega más si es necesario
            { time: 180, text: "Mi reina lejana... de lejos te amo..." }
        ];

        class Particle {
            constructor(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 30 + 15;
                this.speedY = Math.random() * 3 + 1;
                this.opacity = 1;
                this.isBurst = isBurst;
            }
            update() {
                this.y += this.speedY;
                if (this.y > canvas.height + 50) this.y = -50;
                if (this.isBurst) this.opacity -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        // Coronitas cayendo desde arriba
        for (let i = 0; i < 35; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * -canvas.height));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            particles = particles.filter(p => !p.isBurst || p.opacity > 0);
            requestAnimationFrame(animate);
        }
        animate();

        function burstAt(x, y) {
            if (!allowTouch) return;
            for (let i = 0; i < 15; i++) {
                let p = new Particle(x, y, true);
                p.speedY = Math.random() * 6 - 3;
                particles.push(p);
            }
        }

        document.addEventListener('touchstart', e => {
            if (allowTouch) {
                e.preventDefault();
                for (let touch of e.touches) {
                    burstAt(touch.clientX, touch.clientY);
                }
            }
        }, { passive: false });

        document.addEventListener('click', e => {
            if (allowTouch) burstAt(e.clientX, e.clientY);
        });

        function showNextLine() {
            const time = audio.currentTime || 0;
            while (currentIndex < lyricsData.length && time >= lyricsData[currentIndex].time) {
                const text = lyricsData[currentIndex].text;
                let charIndex = 0;
                const interval = setInterval(() => {
                    if (charIndex < text.length) {
                        const span = document.createElement('span');
                        span.textContent = text[charIndex];
                        if (Math.random() > 0.4) span.classList.add('highlight');
                        lyricsDiv.appendChild(span);
                        charIndex++;
                    } else {
                        clearInterval(interval);
                        lyricsDiv.innerHTML += '<br><br>';
                        currentIndex++;
                    }
                }, 60); // Velocidad de aparición de caracteres
            }
            requestAnimationFrame(showNextLine);
        }

        function startSong() {
            intro.classList.add('hidden');
            lyricsDiv.style.display = 'flex';
            status.style.display = 'none';

            // Intentar reproducir inmediatamente
            audio.play().catch(err => {
                status.textContent = "Toca otra vez si no suena";
                status.style.display = 'block';
            });

            allowTouch = true;
            showNextLine(); // Inicia el loop de letras
        }

        // Triggers
        document.getElementById('play-btn').addEventListener('touchstart', startSong);
        intro.addEventListener('touchstart', startSong);
        intro.addEventListener('click', startSong);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
