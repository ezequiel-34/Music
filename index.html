<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reina Lejana - Romántico Reggaetón</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            touch-action: manipulation;
        }
        #intro {
            text-align: center;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #intro h1 {
            font-size: 2.2em;
            color: #ff69b4;
            animation: pulse 2s infinite;
            margin-bottom: 20px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        #play-btn {
            font-size: 8em;
            cursor: pointer;
            transition: transform 0.3s;
        }
        #play-btn:active {
            transform: scale(1.3);
        }
        #status {
            font-size: 1.3em;
            color: #ff69b4;
            margin-top: 30px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            display: none;
        }
        #lyrics-container {
            display: none;
            text-align: center;
            font-size: 1.6em;
            white-space: pre-wrap;
            max-width: 90%;
            z-index: 10;
            line-height: 1.5;
        }
        .highlight {
            color: #ff69b4;
            font-weight: bold;
            text-shadow: 0 0 12px #ff69b4;
        }
        #equalizer {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
        }
        .bar {
            width: 14px;
            height: 0;
            background: linear-gradient(to top, #ff69b4, #ff1493);
            margin: 0 5px;
            border-radius: 7px 7px 0 0;
            transition: height 0.1s ease-out;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="intro">
        <h1>Toca el auricular o la pantalla para reproducir</h1>
        <div id="play-btn">🎧</div>
        <div id="status"></div>
    </div>
    <div id="lyrics-container"></div>
    <div id="equalizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <canvas id="particles"></canvas>

    <audio id="audio" src="musica.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const intro = document.getElementById('intro');
        const status = document.getElementById('status');
        const lyricsContainer = document.getElementById('lyrics-container');
        const equalizer = document.getElementById('equalizer');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let audioCtx = null;
        let analyser = null;
        let source = null;
        let particles = [];
        let allowTouchParticles = false;  // Solo true después de reproducir

        // Letras (completa con tus tiempos reales)
        const lyrics = [
            { time: 0, text: "Reina... lejana... pero tan cerca en mi mente...\n" },
            { time: 5, text: "Ansias que no paran... vení...\n" },
            // ... agrega el resto aquí ...
            { time: 180, text: "Mi reina lejana... de lejos te amo...\n" }
        ];
        let currentLine = 0;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 25 + 15;
                this.speedY = Math.random() * 2.5 + 1;
                this.opacity = 1;
                this.isStar = false;
            }
            update() {
                this.y += this.speedY;
                if (this.y > canvas.height + this.size) this.y = -this.size;
                if (this.isStar) this.opacity -= 0.015;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        // Coronitas cayendo siempre de fondo
        for (let i = 0; i < 25; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.isStar && p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Destellos SOLO cuando allowTouchParticles = true (después de reproducir)
        function addTouchParticles(e) {
            if (!allowTouchParticles) return;
            e.preventDefault();
            const touches = e.touches || [{clientX: e.clientX, clientY: e.clientY}];
            for (let touch of touches) {
                for (let i = 0; i < 12; i++) {
                    let p = new Particle(touch.clientX, touch.clientY);
                    p.isStar = true;
                    p.speedY = Math.random() * 4 - 2;
                    particles.push(p);
                }
            }
        }

        document.addEventListener('touchstart', addTouchParticles, { passive: false });
        document.addEventListener('click', addTouchParticles);

        // Inicializar AudioContext
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
            }
            return audioCtx.resume().catch(() => {});
        }

        const bars = document.querySelectorAll('.bar');
        function animateEqualizer() {
            if (!analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            bars.forEach((bar, i) => {
                const value = dataArray[i * 3] || 0;
                bar.style.height = `${(value / 255) * 140}px`;
            });
            requestAnimationFrame(animateEqualizer);
        }

        function syncLyrics() {
            const time = audio.currentTime;
            while (currentLine < lyrics.length && time >= lyrics[currentLine].time) {
                const line = lyrics[currentLine].text;
                let index = 0;
                const interval = setInterval(() => {
                    if (index < line.length) {
                        const span = document.createElement('span');
                        span.textContent = line[index];
                        if (Math.random() > 0.4) span.classList.add('highlight');
                        lyricsContainer.appendChild(span);
                        index++;
                    } else {
                        clearInterval(interval);
                        lyricsContainer.innerHTML += '<br>';
                        currentLine++;
                    }
                }, 60);
            }
            requestAnimationFrame(syncLyrics);
        }

        async function startPlayback() {
            status.style.display = 'none';
            try {
                await initAudio();
                await audio.play();
                intro.style.display = 'none';
                lyricsContainer.style.display = 'block';
                equalizer.style.display = 'flex';
                allowTouchParticles = true;  // ¡ACTIVA los destellos al tocar!
                animateEqualizer();
                syncLyrics();
            } catch (err) {
                console.log('Error:', err);
                status.textContent = "Toca de nuevo (o mantén presionado) – Android/Chrome necesita confirmación para el sonido";
                status.style.display = 'block';
                setTimeout(() => audio.play().catch(() => {}), 300);
            }
        }

        // Triggers para audio
        intro.addEventListener('touchstart', startPlayback, { once: true });
        intro.addEventListener('click', startPlayback, { once: true });
        document.getElementById('play-btn').addEventListener('touchstart', startPlayback, { once: true });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
